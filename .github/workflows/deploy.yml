# ============================================================
# deploy.yml — Build image + Helm deploy for one PulseHealth app
# ============================================================
# HOW IT WORKS:
#   You pick which app to deploy (workflow_dispatch input) OR it runs
#   on push to main. It builds that app's image, pushes to ACR (via
#   OIDC federated login — NO stored client secret), then runs
#   `helm upgrade --install` with the matching per-app values file.
#
# ONE-TIME SETUP (see docs/RUNBOOK.md for the exact az commands):
#   Create a user-assigned Managed Identity + federated credential
#   for GitHub OIDC, grant it AcrPush + AKS RBAC, then add repo
#   variables/secrets:
#     AZURE_CLIENT_ID        (the identity's client ID)  -> secret
#     AZURE_TENANT_ID                                    -> secret
#     AZURE_SUBSCRIPTION_ID                              -> secret
#     ACR_NAME               e.g. acrpulsehealthdev001   -> variable
#     RESOURCE_GROUP         e.g. rg-pulsehealth-dev      -> variable
#     AKS_CLUSTER            e.g. aks-pulsehealth-dev     -> variable
# ============================================================

name: Build and Deploy PulseHealth App

on:
  workflow_dispatch:
    inputs:
      app:
        description: Which app to deploy
        required: true
        default: patient-portal
        type: choice
        options:
          - patient-portal
          - appointments
          - telehealth
          - billing
  push:
    branches: [ main ]
    paths:
      - 'apps/**'
      - 'helm/**'
      - '.github/workflows/deploy.yml'

# OIDC login needs id-token: write. No client secrets stored anywhere.
permissions:
  id-token: write
  contents: read

env:
  APP: ${{ github.event.inputs.app || 'patient-portal' }}
  ACR_NAME: ${{ vars.ACR_NAME }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
  AKS_CLUSTER: ${{ vars.AKS_CLUSTER }}

jobs:

  # ── Stage 1: Build + push image to ACR ────────────────────
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push with ACR (no local Docker needed)
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.APP }}:${{ github.sha }} \
            --image ${{ env.APP }}:latest \
            apps/${{ env.APP }}

  # ── Stage 2: Helm deploy to AKS ───────────────────────────
  deploy:
    name: Helm deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up kubectl + Helm
        uses: azure/setup-helm@v4

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Ensure namespace + RBAC exist
        run: |
          kubectl apply -f k8s/namespaces.yaml
          kubectl apply -f k8s/rbac/${{ env.APP }}-rbac.yaml

      - name: Helm upgrade --install
        run: |
          helm upgrade --install ${{ env.APP }} ./helm/pulsehealth-app \
            --namespace ${{ env.APP }} \
            --values helm/values/${{ env.APP }}.values.yaml \
            --set image.repository=${{ env.ACR_NAME }}.azurecr.io/${{ env.APP }} \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ env.APP }} -n ${{ env.APP }}
          kubectl get pods,hpa,ingress -n ${{ env.APP }}
