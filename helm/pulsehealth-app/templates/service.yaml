# ============================================================
# service.yaml — stable in-cluster address for the pods
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pulsehealth-app.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "pulsehealth-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "pulsehealth-app.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
