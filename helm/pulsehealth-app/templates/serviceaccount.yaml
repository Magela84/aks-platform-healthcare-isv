# ============================================================
# serviceaccount.yaml — per-app identity inside the namespace
# ============================================================
# Each app runs under its own ServiceAccount. The namespace RBAC
# in k8s/rbac/ binds each team's Role to this account, so a pod in
# one tenant namespace cannot act in another.
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pulsehealth-app.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "pulsehealth-app.labels" . | nindent 4 }}
{{- end }}
